        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050505;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(239, 68, 68, 0.08) 0%, transparent 40%),

            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-panel { 
            background: rgba(18, 18, 18, 0.6); 
            backdrop-filter: blur(14px); 
            -webkit-backdrop-filter: blur(14px); 
            border: 1px solid rgba(255, 255, 255, 0.06);

        .sidebar-slide {

        .glass-backdrop { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            transition: all 0.5s ease; 
        }

        .glass-table-row { 
            transition: all 0.3s ease; 
        }

        .glass-table-row:hover { 
            background: rgba(239, 68, 68, 0.04);

        }

        .liquid-glow { 
            position: fixed; width: 300px; height: 300px; 
            background: linear-gradient(45deg, #ef4444, #991b1b); 
            filter: blur(130px); border-radius: 50%; z-index: -1; opacity: 0.3; 
            animation: floatGlow 12s infinite alternate ease-in-out; 
        }

        @keyframes floatGlow { 
            0% { transform: translate(0, 0) scale(1); } 
            100% { transform: translate(50px, 30px) scale(1.2); } 
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(20, 20, 20, 1); }
        ::-webkit-scrollbar-thumb { background: rgba(239, 68, 68, 0.4); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(239, 68, 68, 0.7); }

        .digital-clock { 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 1px; 
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); 
        }

        select, input[type="date"], input[type="text"], input[type="number"], input[type="password"] { 
            font-size: 16px !important; 
        }

        select { 
            appearance: none; 
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23ef4444' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");

            background-position: right 8px center; 
            padding-right: 30px !important; 
        }

        input[type="date"]::-webkit-calendar-picker-indicator { 
            filter: invert(1) sepia(1) saturate(5) hue-rotate(300deg); 
            cursor: pointer; 
        }

        /* PRINT MEDIA CSS FOR INVOICE */
        @media print {
            body * { visibility: hidden; }
            #printable-bill, #printable-bill * { visibility: visible; color: black !important; }
            #printable-bill { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                max-width: 100%; 
                margin: 0; 
                padding: 20px; 
                background: white !important; 
                box-shadow: none; 
                border: none; 
            }
            .no-print { display: none !important; }
            body { background: white; }
        }
    </style>

        // ==========================================

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true };
            }
            componentDidCatch(error, errorInfo) {
                console.error("Crash captured:", error);
                this.setState({ errorInfo: error.toString() + "\n" + errorInfo.componentStack });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-zinc-950 flex flex-col items-center justify-center p-6 text-center">
                            <i className="fa-solid fa-shield-halved text-red-500 text-6xl mb-4 animate-pulse"></i>
                            <h1 className="text-2xl font-bold text-white mb-2">System Protection Guard Active</h1>
                            <p className="text-gray-400 mb-8 max-w-md">Data conflicts intercepted cleanly. Press reset to rebuild interface workspace safely.</p>
                            <div className="text-[10px] text-red-900 mb-4 font-mono text-left bg-black/50 p-4 rounded overflow-auto max-w-2xl">{this.state.errorInfo}</div>
                            <button 
                                onClick={() => { localStorage.clear(); window.location.reload(); }} 
                                className="bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-8 rounded-xl"
                            >
                                Clear UI Cache & Rebuild Workspace

                    );

        const playAlertBeep = () => {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                [440, 880].forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator(); 
                    const gain = audioCtx.createGain();
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                    osc.connect(gain); 
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + (idx * 0.1)); 
                    osc.stop(audioCtx.currentTime + 0.8 + (idx * 0.1));
                });
            } catch (e) {}
        };

        const LiveClock = () => {
            const [timeStr, setTimeStr] = useState("");
            
            useEffect(() => {
                const updateClock = () => {
                    const now = new Date(); 
                    let hours = now.getHours();
                    const minutes = String(now.getMinutes()).padStart(2, '0'); 
                    const seconds = String(now.getSeconds()).padStart(2, '0');
                    const ampm = hours >= 12 ? 'PM' : 'AM'; 
                    hours = hours % 12; 
                    hours = hours ? hours : 12;
                    setTimeStr(`${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`);
                };
                updateClock(); 
                const interval = setInterval(updateClock, 1000); 
                return () => clearInterval(interval);
            }, []);
            
            return (
                <div className="digital-clock text-lg md:text-xl font-bold text-gray-100 bg-black/40 px-3 md:px-4 py-2 rounded-xl border border-red-500/20 whitespace-nowrap">
                    {timeStr}
                </div>
            );
        };

        // Utility Functions
        const getTodayDateInput = () => { 
            const d = new Date(); 
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; 
        };
        
        const formatDateForDisplay = (dateStr) => { 
            if (!dateStr) return ""; 
            if (dateStr.includes('/')) return dateStr.split('/').join('-'); 
            const parts = dateStr.split('-'); 
            if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`; 
            return dateStr; 
        };
        
        const normalizeDate = (dateStr) => { 
            if (!dateStr) return ""; 
            if (dateStr.includes('/')) { 
                const [d, m, y] = dateStr.split('/'); 
                return `${y}-${m}-${d}`; 
            } 
            return dateStr; 
        };
        
        const getCurrentTimeStr = () => { 
            const now = new Date(); 
            let hours = now.getHours(); 
            const minutes = String(now.getMinutes()).padStart(2, '0'); 
            const ampm = hours >= 12 ? 'PM' : 'AM'; 
            hours = hours % 12; 
            hours = hours ? hours : 12; 
            return `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`; 
        };
        
        const getWeekNumber = (d) => { 
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); 
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); 
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1)); 
            return Math.ceil((((d - yearStart) / 86400000) + 1)/7); 
        };
        
        const formatCountdownDisplay = (totalSecs) => { 
            if (totalSecs === null || totalSecs === undefined) return "00:00:00"; 
            const hrs = String(Math.floor(totalSecs / 3600)).padStart(2, '0'); 
            const mins = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0'); 
            const secs = String(totalSecs % 60).padStart(2, '0'); 
            return `${hrs}:${mins}:${secs}`; 
        };

        const generateBlankCafeForm = () => ({

            phNum: "",

            currentModule: "",

        });

        // Safe Extractors
        const getSafeArray = (arr, defaultArr) => (Array.isArray(arr) ? arr : defaultArr);
        const getSafeObject = (obj, defaultObj) => (obj && typeof obj === 'object' && !Array.isArray(obj) ? obj : defaultObj);

        // ==========================================
        // LOGIN COMPONENT
        // ==========================================
        const LoginScreen = ({ onLogin }) => {
            const [user, setUser] = useState(""); 
            const [pass, setPass] = useState(""); 
            const [error, setError] = useState(false);
            
            const handleAuth = (e) => {

                let savedCreds = { username: 'vino', password: 'vone' };
                try {

                                V<span className="text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]">1</span> GAMING <span className="text-red-500 drop-shadow-[0_0_8px_rgba(239,68,68,0.6)]">CAFE</span>

        // ==========================================
        // TIMER COMPONENTS
        // ==========================================
        const SingleTimerCell = ({ t, rowId, onControl, onUpdateInput, onRemoveTimer, showRemove }) => {
            const [localRem, setLocalRem] = useState(t.remaining);
            
            useEffect(() => {
                let interval;
                if (t.isActive && t.targetMs) {
                    const updateTimer = () => {
                        const rem = Math.max(0, Math.round((t.targetMs - Date.now()) / 1000));
                        setLocalRem(rem);
                        if (rem <= 0) { 
                            clearInterval(interval); 
                            playAlertBeep(); 
                            onControl(rowId, 'complete', t.id); 
                        }
                    };
                    updateTimer(); 
                    interval = setInterval(updateTimer, 1000);
                } else { 
                    setLocalRem(t.remaining); 
                }
                return () => { if (interval) clearInterval(interval); };
            }, [t.isActive, t.targetMs, t.remaining, rowId, t.id, onControl]);

            return (
                <div className="bg-black/40 border border-white/5 p-1.5 rounded-lg relative flex flex-col items-center gap-1 shadow-inner">
                    {showRemove && (
                        <button onClick={() => onRemoveTimer(rowId, t.id)} className="absolute -top-1 -right-1 bg-red-900/80 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px] shadow-lg border border-red-500/50 hover:bg-red-600">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                    )}
                    
                    {t.remaining === null || t.remaining === undefined ? (
                        <div className="flex items-center gap-1 justify-center w-full">
                            <input type="number" placeholder="H" min="0" value={t.hours === 0 ? 0 : (t.hours || "")} onChange={(e) => onUpdateInput(rowId, t.id, "hours", parseInt(e.target.value) || 0)} className="w-9 bg-zinc-900 border border-white/10 rounded p-1 text-center text-xs outline-none focus:border-red-500" />
                            <span className="text-white/40 font-bold">:</span>
                            <input type="number" placeholder="M" min="0" max="59" value={t.mins === 0 ? 0 : (t.mins || "")} onChange={(e) => onUpdateInput(rowId, t.id, "mins", parseInt(e.target.value) || 0)} className="w-9 bg-zinc-900 border border-white/10 rounded p-1 text-center text-xs outline-none focus:border-red-500" />

                                {(t.isActive || localRem > 0) && (
                                    <button onClick={() => onControl(rowId, 'add10m', t.id)} className="text-[9px] font-bold bg-sky-900/40 border border-sky-500/30 text-sky-400 px-1.5 py-1 rounded hover:bg-sky-600/60 transition" title="Add 10 Mins">+10m</button>

        const MultiTimerWrapper = ({ row, onControl, onUpdateInput, onAddTimer, onRemoveTimer }) => {

        // ==========================================

        // ==========================================
        const Dashboard = () => {
            const [sessions, setSessions] = useState(() => {

            const [activeTab, setActiveTab] = useState('dashboard');

            // Settings State

            const calcModuleCost = (bType, nVal, hVal, extraM = 0) => {

                const mod = safeModules.find(m => m.name === bType); 
                if(!mod) return 0;
                if(mod.type === 'flat') return mod.singleRate * totalH;
                if(mod.type === 'pax') return nVal === 1 ? (mod.singleRate * totalH) : (nVal * mod.multiRate * totalH);
                if(mod.type === 'party') return totalH <= 1 ? (mod.singleRate * totalH) : (mod.singleRate + (totalH - 1)*mod.multiRate);

            };

                    const nVal = parseInt(b.nop) || 1; 
                    bookingAmt += calcModuleCost(b.module, nVal, hVal, b.extraMins || 0);

                const foodJuiceAmount = safeFormOrders.reduce((sum, order) => sum + ((order.price||0) * (order.qty||0)), 0);
                return { bookingAmt: Math.round(bookingAmt), foodJuiceAmount: Math.round(foodJuiceAmount), grandTotal: Math.round(bookingAmt + foodJuiceAmount) };

            // ==========================================

                    return { ...row, timers: [...currentTimers, { id: Date.now().toString(), hours: 0, mins: 0, remaining: null, targetMs: null, isActive: false }] };

            const removeTimerFromRow = async (id, timerId) => {

                    return { ...row, timers: (Array.isArray(row.timers)?row.timers:[]).filter(t => t.id !== timerId) };
                });
            };

            const controlTimer = async (id, action, timerId) => { 
                updateTimerInRow(id, (row) => {
                    let currentTimers = Array.isArray(row.timers) && row.timers.length > 0 ? [...row.timers] : [{ id: 'legacy', hours: row.timerHours||0, mins: row.timerMins||0, remaining: row.timerRemaining, targetMs: row.timerTargetMs, isActive: row.timerIsActive }]; 
                    let tIndex = currentTimers.findIndex(x => x.id === timerId); if (tIndex === -1) return row; 
                    let t = {...currentTimers[tIndex]}; 
                    if (action === 'start') { let secs = t.remaining; if (secs === null || secs === undefined) secs = ((parseInt(t.hours)||0)*3600) + ((parseInt(t.mins)||0)*60); if (secs > 0) { t.targetMs = Date.now() + (secs * 1000); t.remaining = secs; t.isActive = true; } } 
                    else if (action === 'pause') { t.remaining = Math.max(0, Math.round((t.targetMs - Date.now())/1000)); t.isActive = false; t.targetMs = null; }

            return <div>{!isAuthenticated ? <LoginScreen onLogin={() => setIsAuthenticated(true)} /> : <Dashboard />}</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
